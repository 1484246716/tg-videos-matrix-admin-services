services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-crm-postgresv2
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_crm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_crm"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tg-crm-redisv2
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 【核心改动】：全部改为 ${变量名} 动态读取 .env 文件
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_API_BASE: ${TELEGRAM_BOT_API_BASE}
      CHANNELS_ROOT_DIR: ${CHANNELS_ROOT_DIR}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # 补全 Relay 相关变量
      RELAY_MIN_STABLE_CHECKS: ${RELAY_MIN_STABLE_CHECKS}
      RELAY_STABLE_INTERVAL_MS: ${RELAY_STABLE_INTERVAL_MS}
      RELAY_MTIME_COOLDOWN_MS: ${RELAY_MTIME_COOLDOWN_MS}
    command: sh -c "pnpm --filter @tg-crm/api exec prisma generate && pnpm --filter @tg-crm/api run start"
    ports:
      - "3001:3001"
    volumes:
      # 【核心修复】：挂载父目录，确保 channels 和 archived 处于同一文件系统
      - ./data/tg-crm:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-crm-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      tg-bot-api-v2:
        condition: service_started
    environment:
      # 【核心改动】：全部改为 ${变量名} 动态读取
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
      TELEGRAM_BOT_API_BASE: ${TELEGRAM_BOT_API_BASE}
      CHANNELS_ROOT_DIR: ${CHANNELS_ROOT_DIR}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # 补全 Relay 相关变量
      RELAY_MIN_STABLE_CHECKS: ${RELAY_MIN_STABLE_CHECKS}
      RELAY_STABLE_INTERVAL_MS: ${RELAY_STABLE_INTERVAL_MS}
      RELAY_MTIME_COOLDOWN_MS: ${RELAY_MTIME_COOLDOWN_MS}
      # 补全所有 GramJS 核心上传变量
      GRAMJS_API_ID: ${GRAMJS_API_ID}
      GRAMJS_API_HASH: ${GRAMJS_API_HASH}
      GRAMJS_BOT_TOKEN: ${GRAMJS_BOT_TOKEN}
      GRAMJS_SESSION: ${GRAMJS_SESSION}
      RELAY_UPLOAD_GRAMJS_THRESHOLD_MB: ${RELAY_UPLOAD_GRAMJS_THRESHOLD_MB}
      GRAMJS_FORWARD_TARGET_CHAT_ID: ${GRAMJS_FORWARD_TARGET_CHAT_ID}
      GRAMJS_UPLOAD_WORKERS: ${GRAMJS_UPLOAD_WORKERS}
    command: sh -c "pnpm --filter @tg-crm/api exec prisma generate && pnpm --filter @tg-crm/worker run start"
    volumes:
      # 【核心修复】：与 API 保持一致，挂载父目录
      - ./data/tg-crm:/data

  tg-bot-api-v2:
    image: aiogram/telegram-bot-api:latest
    container_name: tg-bot-api-v2
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: "6"
      TELEGRAM_API_HASH: "eb06d4abfb49dc3eeb1aeb98ae0f581e"
      TELEGRAM_LOCAL: "1"
      TELEGRAM_VERBOSITY: "4"
    command:
      - "--http-timeout"
      - "3600"
      - "--http-poll-timeout"
      - "3600"
      - "--log-verbosity"
      - "4"
      - "--temp-dir"
      - "/var/lib/telegram-bot-api/tmp"
    ports:
      - "8082:8081"
    volumes:
      - ./videos:/app/videos
      - ./data/tg-bot-api:/var/lib/telegram-bot-api
      - ./data/tg-bot-api-tmp:/var/lib/telegram-bot-api/tmp

  alist:
    image: xhofe/alist:latest
    container_name: tg-crm-alistv2
    restart: unless-stopped
    ports:
      - "5244:5244"
    environment:
      PUID: "0"
      PGID: "0"
      UMASK: "022"
    volumes:
      - ./data/alist:/opt/alist/data
      # 【核心修复】：挂载父目录，方便你在 Alist 里同时管理待处理和已归档文件
      - ./data/tg-crm:/data

volumes:
  pg_data:
  redis_data: