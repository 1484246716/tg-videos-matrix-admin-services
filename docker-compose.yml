services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-crm-postgresv2
    restart: unless-stopped
    command: postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-300}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_crm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_crm"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tg-crm-redisv2
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 【备份】：数据库专属备份 (每天凌晨 3:00 导出 SQL 压缩包)
  pg-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: tg-crm-pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: tg_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SCHEDULE: "0 3 * * *"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - ./data/backups/postgres:/backups

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_API_BASE: ${TELEGRAM_BOT_API_BASE}
      CHANNELS_ROOT_DIR: ${CHANNELS_ROOT_DIR}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENSEARCH_NODE: ${OPENSEARCH_NODE}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX}
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      RELAY_MIN_STABLE_CHECKS: ${RELAY_MIN_STABLE_CHECKS}
      RELAY_STABLE_INTERVAL_MS: ${RELAY_STABLE_INTERVAL_MS}
      RELAY_MTIME_COOLDOWN_MS: ${RELAY_MTIME_COOLDOWN_MS}
      # 👇 解决前端跨域的核心变量穿透
      CORS_ORIGIN: ${CORS_ORIGIN}
    command: sh -c "pnpm --filter @tg-crm/api exec prisma generate && pnpm --filter @tg-crm/api run start"
    ports:
      - "3001:3001" # 如果你配置好反代后，为了安全，可以把这里的对外端口映射删掉
    volumes:
      - ./data/tg-crm:/data
      # 👇 映射 API 服务日志到宿主机
      - ./api/logs:/app/api/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-crm-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      tg-bot-api-v2:
        condition: service_started
      ffmpeg:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
      SCHEDULER_POLL_MS: ${SCHEDULER_POLL_MS:-10000}
      TASK_DEFINITION_LOCK_TTL_MS: ${TASK_DEFINITION_LOCK_TTL_MS}
      TASK_DEFINITION_ERROR_RETRY_SEC: ${TASK_DEFINITION_ERROR_RETRY_SEC}
      CHANNEL_LOCK_TTL_MS: ${CHANNEL_LOCK_TTL_MS}
      TELEGRAM_BOT_API_BASE: ${TELEGRAM_BOT_API_BASE}
      CHANNELS_ROOT_DIR: ${CHANNELS_ROOT_DIR}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENSEARCH_NODE: ${OPENSEARCH_NODE}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX}
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      RELAY_MIN_STABLE_CHECKS: ${RELAY_MIN_STABLE_CHECKS}
      RELAY_STABLE_INTERVAL_MS: ${RELAY_STABLE_INTERVAL_MS}
      RELAY_MTIME_COOLDOWN_MS: ${RELAY_MTIME_COOLDOWN_MS}
      RELAY_ENABLE_FFPROBE_CHECK: ${RELAY_ENABLE_FFPROBE_CHECK}
      RELAY_FFPROBE_TIMEOUT_MS: ${RELAY_FFPROBE_TIMEOUT_MS}
      RELAY_FFPROBE_MIN_DURATION_SEC: ${RELAY_FFPROBE_MIN_DURATION_SEC}
      RELAY_LOCAL_PATH_LOCK_TTL_MS: ${RELAY_LOCAL_PATH_LOCK_TTL_MS}
      GRAMJS_API_ID: ${GRAMJS_API_ID}
      GRAMJS_API_HASH: ${GRAMJS_API_HASH}
      GRAMJS_BOT_TOKEN: ${GRAMJS_BOT_TOKEN}
      GRAMJS_SESSION: ${GRAMJS_SESSION}
      RELAY_UPLOAD_GRAMJS_THRESHOLD_MB: ${RELAY_UPLOAD_GRAMJS_THRESHOLD_MB}
      RELAY_UPLOAD_SEND_DOCUMENT_THRESHOLD_MB: ${RELAY_UPLOAD_SEND_DOCUMENT_THRESHOLD_MB}
      GRAMJS_FORWARD_TARGET_CHAT_ID: ${GRAMJS_FORWARD_TARGET_CHAT_ID}
      GRAMJS_UPLOAD_WORKERS: ${GRAMJS_UPLOAD_WORKERS}
      RELAY_UPLOAD_QUEUE_CONCURRENCY: ${RELAY_UPLOAD_QUEUE_CONCURRENCY}
      TYPEA_INGEST_MAX_RETRIES: ${TYPEA_INGEST_MAX_RETRIES}
      TYPEA_INGEST_STALE_MS: ${TYPEA_INGEST_STALE_MS}
      TYPEA_RECONCILE_BATCH: ${TYPEA_RECONCILE_BATCH}
      TYPEA_INGEST_LEASE_MS: ${TYPEA_INGEST_LEASE_MS}
      TYPEA_RECONCILE_ENABLED: ${TYPEA_RECONCILE_ENABLED}
      TYPEA_FAIL_ON_FILE_MISSING: ${TYPEA_FAIL_ON_FILE_MISSING}
      TYPEA_MAX_UPLOAD_SIZE_MB: ${TYPEA_MAX_UPLOAD_SIZE_MB}
      TYPEA_ALERT_STALE_THRESHOLD: ${TYPEA_ALERT_STALE_THRESHOLD}
      TYPEA_ALERT_FAILED_FINAL_SPIKE_THRESHOLD: ${TYPEA_ALERT_FAILED_FINAL_SPIKE_THRESHOLD}
      TYPEA_ALERT_QUEUE_STUCK_MINUTES: ${TYPEA_ALERT_QUEUE_STUCK_MINUTES}
    command: sh -c "pnpm --filter @tg-crm/api exec prisma generate && pnpm --filter @tg-crm/worker run start"
    volumes:
      - ./data/tg-crm:/data
      # 👇 映射 Worker 服务日志到宿主机
      - ./worker/logs:/app/worker/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

  ffmpeg:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: tg-crm-ffmpeg
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]

  tg-bot-api-v2:
    image: aiogram/telegram-bot-api:latest
    container_name: tg-bot-api-v2
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: "6"
      TELEGRAM_API_HASH: "eb06d4abfb49dc3eeb1aeb98ae0f581e"
      TELEGRAM_LOCAL: "1"
      TELEGRAM_VERBOSITY: "4"
    command:
      - "--http-timeout"
      - "3600"
      - "--http-poll-timeout"
      - "3600"
      - "--log-verbosity"
      - "4"
      - "--temp-dir"
      - "/var/lib/telegram-bot-api/tmp"
    ports:
      - "8082:8081"
    volumes:
      - ./videos:/app/videos
      - ./data/tg-bot-api:/var/lib/telegram-bot-api
      - ./data/tg-bot-api-tmp:/var/lib/telegram-bot-api/tmp

  ffprobe:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: tg-crm-ffprobe
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: tg-crm-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  alist:
    image: xhofe/alist:latest
    container_name: tg-crm-alistv2
    restart: unless-stopped
    ports:
      - "5244:5244" # 配置好反代后，这里也可以酌情删掉映射
    environment:
      PUID: "0"
      PGID: "0"
      UMASK: "022"
    volumes:
      - ./data/alist:/opt/alist/data
      - ./data/tg-crm:/data

  # 【新增】：Nginx Proxy Manager 反向代理服务
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: tg-crm-npm
    restart: unless-stopped
    ports:
      - '80:80'      # HTTP 默认端口，必须开放
      - '443:443'    # HTTPS 默认端口，必须开放
      - '81:81'      # NPM 管理后台端口
    volumes:
      - ./data/npm/config:/data
      - ./data/npm/letsencrypt:/etc/letsencrypt

  # 【清理】：定时清理 API/Worker 文件日志
  log-cleaner:
    image: alpine:3.20
    container_name: tg-crm-log-cleaner
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      LOG_RETENTION_DAYS: "7"
      CLEAN_INTERVAL_HOURS: "24"
    volumes:
      - ./api/logs:/logs/api
      - ./worker/logs:/logs/worker
    command: >-
      sh -c "while true; do
      find /logs/api /logs/worker -type f -name '*.log' -mtime +${LOG_RETENTION_DAYS} -delete;
      sleep $((CLEAN_INTERVAL_HOURS * 3600));
      done"

  # 【备份】：系统级综合备份服务 (每天凌晨 4:00 统一打包核心配置与数据)
  system-backup:
    image: offen/docker-volume-backup:v2
    container_name: tg-crm-system-backup
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 4 * * *"
      BACKUP_FILENAME: "matrix-system-backup-%Y%m%d_%H%M%S.tar.gz"
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      # --- 源数据 (只读模式 :ro 保障绝对安全) ---
      - redis_data:/backup/redis:ro
      - ./data/alist:/backup/alist:ro
      - ./data/npm:/backup/npm:ro
      - ./data/backups/postgres:/backup/postgres_dumps:ro
      # --- 备份输出目录 ---
      - ./data/backups/system_archive:/archive

volumes:
  pg_data:
  redis_data:
  opensearch_data:
