services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-crm-postgresv2
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_crm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_crm"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tg-crm-redisv2
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tg_crm?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-replace_me}
      # 【同步修改点】：这里也要改成新名字，否则 api 连不上 bot 容器
      TELEGRAM_BOT_API_BASE: http://tg-bot-api-v2:8081
      CHANNELS_ROOT_DIR: /data/channels
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    command: sh -c "pnpm --filter @tg-crm/api exec prisma generate && pnpm --filter @tg-crm/api run start"
    ports:
      - "3001:3001"
    volumes:
      - ./data/tg-crm/channels:/data/channels
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-crm-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      # 【同步修改点】：依赖的服务名换成新名字
      tg-bot-api-v2:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tg_crm?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      # 【同步修改点】：这里也要改成新名字，否则 worker 连不上 bot 容器
      TELEGRAM_BOT_API_BASE: http://tg-bot-api-v2:8081
      GRAMJS_API_ID: "${GRAMJS_API_ID:-}"
      GRAMJS_API_HASH: "${GRAMJS_API_HASH:-}"
      GRAMJS_BOT_TOKEN: "${GRAMJS_BOT_TOKEN:-}"
      GRAMJS_SESSION: "${GRAMJS_SESSION:-}"
      RELAY_UPLOAD_GRAMJS_THRESHOLD_MB: "${RELAY_UPLOAD_GRAMJS_THRESHOLD_MB:-1024}"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    command: sh -c "pnpm --filter @tg-crm/api exec prisma generate && pnpm --filter @tg-crm/worker run start"
    volumes:
      - ./data/tg-crm/channels:/data/channels

  # 【主要修改点】：服务名和容器名都加上了 -v2 的后缀
  tg-bot-api-v2:
    image: aiogram/telegram-bot-api:latest
    container_name: tg-bot-api-v2
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: "6"
      TELEGRAM_API_HASH: "eb06d4abfb49dc3eeb1aeb98ae0f581e"
      TELEGRAM_LOCAL: "1"
      TELEGRAM_VERBOSITY: "4"
    command:
      - "--http-timeout"
      - "3600"
      - "--http-poll-timeout"
      - "3600"
      - "--log-verbosity"
      - "4"
      - "--temp-dir"
      - "/var/lib/telegram-bot-api/tmp"
    ports:
      # 为了防止端口冲突，把暴露到外部的端口从 8081 改成 8082，容器内部还是 8081
      - "8082:8081"
    volumes:
      - ./videos:/app/videos
      - ./data/tg-bot-api:/var/lib/telegram-bot-api
      - ./data/tg-bot-api-tmp:/var/lib/telegram-bot-api/tmp

  alist:
    image: xhofe/alist:latest
    container_name: tg-crm-alistv2
    restart: unless-stopped
    ports:
      - "5244:5244"
    environment:
      PUID: "0"
      PGID: "0"
      UMASK: "022"
    volumes:
      - ./data/alist:/opt/alist/data
      - ./data/tg-crm/channels:/data/channels

volumes:
  pg_data:
  redis_data: