services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_crm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_crm"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tg-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ffprobe:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: tg-crm-ffprobe
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: ["sleep infinity"]

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: tg-crm-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  alist:
    image: xhofe/alist:latest
    container_name: tg-crm-alist
    restart: unless-stopped
    ports:
      - "5244:5244"
    environment:
      PUID: "0"
      PGID: "0"
      UMASK: "022"
    volumes:
      - ./data/alist:/opt/alist/data
      - ./data/tg-crm/channels:/data/channels

volumes:
  pg_data:
  redis_data:
  opensearch_data:

